name: Build and Deploy

on:
  push:
    branches: [source]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build site
        run: |
          # _config_demo.yml is only for the upstream demo site — ignore it in forks/copies
          if [ -f _config_demo.yml ] && [ "$GITHUB_REPOSITORY" = "sbryngelson/academic-website-template" ]; then
            bundle exec jekyll build --config _config.yml,_config_demo.yml
          else
            bundle exec jekyll build
          fi
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
